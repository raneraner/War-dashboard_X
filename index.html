<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ran's Holon Radar</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <style>
        @-webkit-keyframes flicker { 0% { opacity: 0.96; } 50% { opacity: 1; } 100% { opacity: 0.98; } }
        @-webkit-keyframes redAlert { 0% { background-color: black; } 50% { background-color: #ff0000; } 100% { background-color: black; } }
        @-webkit-keyframes orangeAlert { 0% { background-color: black; } 50% { background-color: #ff7700; } 100% { background-color: black; } }

        body::after {
          content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
          background: -webkit-linear-gradient(top, rgba(0,0,0,0) 50%, rgba(0,0,0,0.1) 50%);
          background-size: 100% 4px; z-index: 999; pointer-events: none;
        }

        body { 
            background-color: black; color: #00FF00; font-family: monospace; 
            text-align: center; padding-top: 3%; overflow: hidden; direction: rtl;
            -webkit-animation: flicker 0.15s infinite;
        }

        /* מחלקות חירום - אדום (אזעקה) */
        body.emergency { -webkit-animation: redAlert 0.4s infinite !important; }
        body.emergency #holon-status { 
            border-color: #ffffff; color: #ffffff; background-color: #ff0000;
            font-weight: bold; font-size: 45px;
        }
        body.shrapnel-alert #holon-status { 
            border-color: #ffffff; color: #ffffff; background-color: #ff0000;
            font-weight: bold; font-size: 45px;
        }

        /* מחלקות חירום - כתום (צפי) */
        body.warning-flicker { -webkit-animation: orangeAlert 0.6s infinite !important; }
        body.warning-flicker #holon-status { 
            border-color: #ffffff; color: #ffffff; background-color: #ff7700;
            font-weight: bold; font-size: 45px;
        }
        body.warning-static #holon-status { 
            border-color: #ffffff; color: #ffffff; background-color: #ff7700;
            font-weight: bold; font-size: 45px;
        }

        .separator { border-top: 2px dashed #004400; margin: 25px auto; width: 90%; }
        .section-title { font-size: 26px; color: #005500; margin-bottom: 12px; }

        #clock { font-size: 90px; margin-bottom: 0; }
        #date { font-size: 32px; color: #008800; margin-top: 5px; }

        #temp { font-size: 60px; font-weight: bold; margin-bottom: 7px; }
        #rain-info { font-size: 28px; }

        #holon-status { 
            font-size: 40px; border: 3px solid #00FF00; display: inline-block; 
            padding: 12px 30px; margin-top: 5px; color: #00FF00;
        }

        .debug-line { font-size: 18px; color: #007700; margin-top: 5px; transition: color 0.3s; text-align: right; margin-right: 5%; }
        #debug-container { margin-top: 15px; }

        #timer { font-size: 34px; font-weight: bold; white-space: nowrap; }
    </style>
</head>
<body>
    
    <div id="clock">00:00:00</div>
    <div id="date">--/--/----</div>

    <div class="separator"></div>

    <div class="section-title">מזג אוויר:</div>
    <div id="temp">--°C</div>
    <div id="rain-info">בודק צפי לגשם...</div>

    <div class="separator"></div>

    <div class="section-title">מלחמה:</div>
    <div id="holon-status">חולון: אין התרעות</div>
    <div id="debug-container">
        <div id="debug-alarms" class="debug-line"></div>
        <div id="debug-pushes" class="debug-line"></div>
        <div id="debug-diag" class="debug-line" style="font-size: 14px; text-align: center; margin: 5px 0 0 0;">אבחון רשת: מתחבר...</div>
    </div>

    <div class="separator"></div>

    <div class="section-title">יומולדת 8 לעומר:</div>
    <div id="timer">טוען...</div>

    <script>
        var lastSuccessTime = new Date().getTime();
        var isFetchingAlerts = false; 
        var lockTime = 0; 

        function updateClock() {
            var now = new Date();
            var h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            if (h < 10) h = "0" + h; if (m < 10) m = "0" + m; if (s < 10) s = "0" + s;
            document.getElementById("clock").innerHTML = h + ":" + m + ":" + s;
            document.getElementById("date").innerHTML = now.toLocaleDateString("he-IL");
        }

        function updateWeather() {
            var url = "https://api.open-meteo.com/v1/forecast?latitude=32.01&longitude=34.78&current_weather=true&daily=precipitation_sum&timezone=Asia%2FJerusalem";
            
            fetch(url).then(function(r){return r.json()}).then(function(data){
                document.getElementById("temp").innerHTML = Math.round(data.current_weather.temperature) + "°C";
                var currentCode = data.current_weather.weathercode;
                var rainToday = data.daily.precipitation_sum[0];
                var rainTomorrow = data.daily.precipitation_sum[1];
                var rText = "אין צפי לגשם בימים הקרובים";
                
                if (currentCode === 61 || currentCode === 63 || currentCode === 65 || 
                    currentCode === 80 || currentCode === 81 || currentCode === 82) {
                    rText = "גשום כרגע!";
                } else if (rainToday > 0) {
                    var currentHour = new Date().getHours();
                    if (currentHour < 18) {
                        rText = "גשם צפוי בהמשך היום";
                    } else {
                        rText = "גשם צפוי הלילה";
                    }
                } else if (rainTomorrow > 0) {
                    rText = "גשם צפוי מחר";
                }
                document.getElementById("rain-info").innerHTML = rText;
            });
        }

        function checkHolonAlert() {
            var nowTime = new Date().getTime();
            if (isFetchingAlerts) {
                if (nowTime - lockTime > 20000) { isFetchingAlerts = false; } else { return; }
            }
            isFetchingAlerts = true; lockTime = nowTime;
            var targetUrl = "https://script.google.com/macros/s/AKfycbz_2w4SkUX2qxP27pVCX4g-tsZbtttKb5X95TGG4FBRcFihafSjQBDDkYQKfXOPraXQjA/exec";
            var fetchUrl = targetUrl + "?v=" + lockTime;
            fetch(fetchUrl).then(function(response) {
                if (!response.ok) throw new Error("HTTP Status: " + response.status);
                return response.text();
            }).then(function(rawText) {
                isFetchingAlerts = false; var now = new Date(); var diagDiv = document.getElementById("debug-diag");
                var alertsData = []; var pushesData = [];
                if (rawText !== "" && rawText.indexOf("<") !== 0) {
                    try {
                        var parsedData = JSON.parse(rawText);
                        if (Array.isArray(parsedData)) { alertsData = parsedData; diagDiv.innerHTML = "אבחון: מצב מיושן. עדכן סקריפט גוגל."; }
                        else { alertsData = parsedData.alerts || []; pushesData = parsedData.pushes || []; diagDiv.innerHTML = "אבחון: פועל. אזהרות: " + alertsData.length + ", צפי: " + pushesData.length; }
                    } catch(e) { diagDiv.innerHTML = "אבחון: שגיאת פענוח JSON מגוגל."; }
                } else { diagDiv.innerHTML = "אבחון: תשובה ריקה מגוגל."; }
                lastSuccessTime = now.getTime();
                
                var extractTimeObj = function(str) {
                    var isoMatch = str.match(/"time"\s*:\s*"([^"]+)"/);
                    if (isoMatch && isoMatch[1].indexOf('T') !== -1) { var d = new Date(isoMatch[1]); if (!isNaN(d.getTime())) return d; }
                    var fMatch = str.match(/(\d{4}-\d{2}-\d{2})[T\s]([0-2]\d:[0-5]\d:[0-5]\d)/);
                    if (fMatch) { var dp = fMatch[1].split("-"), tp = fMatch[2].split(":"); return new Date(dp[0], dp[1]-1, dp[2], tp[0], tp[1], tp[2]); }
                    var nMatch = str.match(/"(?:time|date|alertDate)"\s*:\s*(17\d{8,11})/i);
                    if (nMatch) { var ts = parseInt(nMatch[1]); return new Date(ts > 9999999999 ? ts : ts * 1000); }
                    var tMatch = str.match(/([0-2]\d):([0-5]\d):([0-5]\d)/);
                    if (tMatch) { var d2 = new Date(); d2.setHours(parseInt(tMatch[1]), parseInt(tMatch[2]), parseInt(tMatch[3]), 0); return d2; }
                    return null;
                };

                var startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0).getTime();
                var timeNowStr = now.toLocaleTimeString("he-IL");

                // --- לוגיקת אזעקות אמת ---
                var latestAlarmTimeStr = "שקט בחולון", alarmsToday = 0, isAlarmActive = false, alarmAgeMinutes = -1;
                for (var j = 0; j < alertsData.length; j++) {
                    var rowA = JSON.stringify(alertsData[j] || {});
                    if (rowA.indexOf("חולון") !== -1) {
                        var dObjA = extractTimeObj(rowA);
                        if (dObjA) {
                            if (dObjA.getTime() >= startOfDay) alarmsToday++;
                            if (dObjA.getTime() > 0) {
                                var hA = dObjA.getHours(), mA = dObjA.getMinutes(), sA = dObjA.getSeconds();
                                var curAStr = (hA < 10 ? "0"+hA : hA) + ":" + (mA < 10 ? "0"+mA : mA) + ":" + (sA < 10 ? "0"+sA : sA);
                                if (latestAlarmTimeStr === "שקט בחולון" || curAStr > latestAlarmTimeStr) latestAlarmTimeStr = curAStr;
                            }
                            var diffA = (now.getTime() - dObjA.getTime()) / 60000;
                            if (diffA < -1000) diffA += 1440;
                            if (diffA <= 10 && diffA >= 0) { isAlarmActive = true; if (alarmAgeMinutes === -1 || diffA < alarmAgeMinutes) alarmAgeMinutes = diffA; }
                        }
                    }
                }

                // --- לוגיקת התרעות צפי ---
                var latestPushTimeStr = "שקט בחולון", pushesToday = 0, isPushActive = false, pushAgeMinutes = -1;
                for (var k = 0; k < pushesData.length; k++) {
                    var rowP = JSON.stringify(pushesData[k] || {});
                    if (rowP.indexOf("חולון") !== -1) {
                        var dObjP = extractTimeObj(rowP);
                        if (dObjP) {
                            if (dObjP.getTime() >= startOfDay) pushesToday++;
                            if (dObjP.getTime() > 0) {
                                var hP = dObjP.getHours(), mP = dObjP.getMinutes(), sP = dObjP.getSeconds();
                                var curPStr = (hP < 10 ? "0"+hP : hP) + ":" + (mP < 10 ? "0"+mP : mP) + ":" + (sP < 10 ? "0"+sP : sP);
                                if (latestPushTimeStr === "שקט בחולון" || curPStr > latestPushTimeStr) latestPushTimeStr = curPStr;
                            }
                            var diffP = (now.getTime() - dObjP.getTime()) / 60000;
                            if (diffP < -1000) diffP += 1440;
                            if (diffP <= 10 && diffP >= 0) { isPushActive = true; if (pushAgeMinutes === -1 || diffP < pushAgeMinutes) pushAgeMinutes = diffP; }
                        }
                    }
                }

                // --- יישור ועיצוב דינמי של שורות הנתונים ---
                var padStr = function(str, len) { while (str.length < len) str += " "; return str; };
                var alarmRowTitle = "אזעקה אחרונה: "; var pushRowTitle = "התרעה אחרונה: ";
                var maxTitleLen = Math.max(alarmRowTitle.length, pushRowTitle.length);
                var sep = " | ";

                document.getElementById("debug-alarms").innerHTML = padStr(alarmRowTitle, maxTitleLen) + latestAlarmTimeStr + sep + "אזעקות ביממה: " + padStr(alarmsToday.toString(), 2) + sep + "עודכן: " + timeNowStr;
                document.getElementById("debug-pushes").innerHTML = padStr(pushRowTitle, maxTitleLen) + latestPushTimeStr + sep + "התרעות ביממה: " + padStr(pushesToday.toString(), 2) + sep + "עודכן: " + timeNowStr;

                // --- היררכיית מצבים וויזואליים ---
                var statusDiv = document.getElementById("holon-status");
                if (isAlarmActive) { statusDiv.innerHTML = "אזעקה בחולון!"; if (alarmAgeMinutes <= 2) document.body.className = "emergency"; else document.body.className = "shrapnel-alert"; }
                else if (isPushActive) { statusDiv.innerHTML = "חולון: צפי לאזעקה"; if (pushAgeMinutes <= 1) document.body.className = "warning-flicker"; else document.body.className = "warning-static"; }
                else { document.body.className = ""; statusDiv.innerHTML = "חולון: אין התרעות"; }
            }).catch(function(error) { isFetchingAlerts = false; document.getElementById("debug-diag").innerHTML = "אבחון: שגיאת תקשורת רשת (" + error.message + ")."; });
        }

        function checkConnectionHealth() {
            var now = new Date().getTime(); var diffSeconds = (now - lastSuccessTime) / 1000; var diagDiv = document.getElementById("debug-diag");
            if (diagDiv) {
                if (diffSeconds > 35) { diagDiv.style.color = "#ff7700"; diagDiv.innerHTML = "אבחון: אין נתונים מגוגל כ-35 שניות."; }
                else if (diagDiv.innerHTML.indexOf("פועל") !== -1) { diagDiv.style.color = "#007700"; }
            }
        }

        function updateCountdown() {
            var target = new Date(2026, 3, 1, 0, 0, 0); var diff = target - new Date();
            if (diff <= 0) { document.getElementById("timer").innerHTML = "מזל טוב!"; return; }
            var d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            document.getElementById("timer").innerHTML = d + " ימים " + h + " שעות " + m + " דקות " + s + " שניות ";
        }

        setInterval(updateClock, 1000); setInterval(updateCountdown, 1000); setInterval(checkHolonAlert, 15000); setInterval(checkConnectionHealth, 2000); setInterval(updateWeather, 900000);
        updateClock(); updateCountdown(); updateWeather(); checkHolonAlert();
    </script>
</body>
</html>
